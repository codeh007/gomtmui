name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
      NEXT_PUBLIC_GOMTM_SERVER_URL: ${{ vars.NEXT_PUBLIC_GOMTM_SERVER_URL || vars.GOMTM_SERVER_URL }}
      BASE_URL: ${{ vars.BASE_URL }}
      GOMTM_SERVER_URL: ${{ vars.GOMTM_SERVER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            .open-next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'open-next.config.ts', 'src/**/*.{ts,tsx,js,jsx}', 'public/**/*') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts', 'open-next.config.ts') }}-
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Build application
        run: bun run build

      - name: Build OpenNext worker bundle
        run: npx opennextjs-cloudflare build --skipNextBuild

      - name: Prepare runtime secrets file
        run: |
          cat <<EOF > .wrangler-secrets.env
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          EOF

      - name: Deploy to Cloudflare Workers
        run: >-
          npx wrangler deploy
          --secrets-file .wrangler-secrets.env
          --var NEXT_PUBLIC_SUPABASE_URL:${NEXT_PUBLIC_SUPABASE_URL}
          --var NEXT_PUBLIC_SUPABASE_ANON_KEY:${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          --var NEXT_PUBLIC_SITE_URL:${NEXT_PUBLIC_SITE_URL}
          --var NEXT_PUBLIC_BASE_URL:${NEXT_PUBLIC_BASE_URL}
          --var NEXT_PUBLIC_GOMTM_SERVER_URL:${NEXT_PUBLIC_GOMTM_SERVER_URL}
          --var BASE_URL:${BASE_URL}
          --var GOMTM_SERVER_URL:${GOMTM_SERVER_URL}

      - name: Remove runtime secrets file
        if: always()
        run: rm -f .wrangler-secrets.env

      - name: Write deployment summary
        run: |
          {
            echo '## Deployment Result'
            echo ''
            echo '- Worker: `gomtmui`'
            echo '- Trigger: `${{ github.event_name }}`'
            echo '- Branch: `${{ github.ref_name }}`'
            echo '- Domain: `https://gomtmui-dev.yuepa8.com`'
            echo '- Runtime secrets delivery: `wrangler deploy --secrets-file` from GitHub Secrets (`SUPABASE_SERVICE_ROLE_KEY` only)'
            echo '- Public runtime config source: `wrangler deploy --var` from GitHub Variables (site/base URLs, gomtm server URL, and public Supabase config only)'
            echo '- Caches: `~/.bun/install/cache`, `.next/cache`, `.open-next/cache`'
          } >> "$GITHUB_STEP_SUMMARY"
